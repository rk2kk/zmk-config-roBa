########################################
# 基本機能
########################################
CONFIG_ZMK_POINTING=y               # ポインティングデバイス機能を有効化
CONFIG_MOUSE=y                      # マウス機能を有効化（ポインティングデバイスと連携）
CONFIG_NFCT_PINS_AS_GPIOS=y         # NFCピンをGPIOとして使用
CONFIG_GPIO=y                       # GPIO機能を有効化
CONFIG_SPI=y                        # SPI通信を有効化
CONFIG_INPUT=y                      # 入力デバイス機能を有効化
CONFIG_ZMK_EXT_POWER=y              # 外部電源制御機能を有効化

########################################
# Bluetooth設定
########################################
CONFIG_ZMK_BLE=y                    # Bluetooth Low Energy機能を有効化
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y      # BLE送信電力を+8dBmに設定（通信範囲拡大）

# セキュリティ・ペアリング設定
CONFIG_BT_SMP=y                     # セキュアペアリングを有効化
CONFIG_BT_BONDABLE=y                # ペアリング情報を保持

# 接続パラメータ（単位は1.25ms）
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6 # 接続間隔の最小値（7.5ms）
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12# 接続間隔の最大値（15ms）
# CONFIG_BT_PERIPHERAL_PREF_LATENCY=0 # 接続遅延設定（未使用）
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400 # 接続タイムアウト（5秒単位）

# ACL通信バッファ設定
CONFIG_BT_BUF_ACL_RX_SIZE=251       # ACL受信バッファサイズ
CONFIG_BT_BUF_ACL_TX_SIZE=251       # ACL送信バッファサイズ
CONFIG_BT_BUF_ACL_RX_COUNT=10       # ACL受信バッファ数
CONFIG_BT_BUF_ACL_TX_COUNT=10       # ACL送信バッファ数

########################################
# バッテリー管理
########################################
CONFIG_ZMK_BATTERY_REPORTING=y      # バッテリーレベルをレポート
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y # セントラルがバッテリー残量を取得
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y    # ペリフェラルのバッテリー情報を転送

########################################
# ロータリーエンコーダ設定
########################################
CONFIG_EC11=y                       # EC11エンコーダを有効化
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y # グローバルスレッドでEC11イベントを処理

########################################
# ポインティングデバイス (PMW3610センサー)
########################################
CONFIG_PMW3610=y                    # PMW3610光学センサーを有効化
CONFIG_PMW3610_INVERT_X=n           # X軸を反転しない
CONFIG_PMW3610_INVERT_Y=y           # Y軸を反転
CONFIG_PMW3610_REPORT_INTERVAL_MIN=16 # 最小レポート間隔(ms)
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y # BLE実験的接続設定（無効化中）

########################################
# RGB LED バッテリー通知
########################################
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30   # 高バッテリーレベル閾値(%)
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10 # 低バッテリーレベル閾値(%)

########################################
# ZMK Studio設定
########################################
CONFIG_ZMK_STUDIO=y                # ZMK Studio連携を有効化
CONFIG_ZMK_STUDIO_LOCKING=n        # Studioのロック機能を無効化

########################################
# キーボード固有設定
########################################
CONFIG_ZMK_KEYBOARD_NAME="zmk"     # キーボード名を設定

# Debug logging settings
CONFIG_ZMK_USB_LOGGING=y
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=8000
