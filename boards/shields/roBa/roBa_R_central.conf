########################################
# Basic Features
########################################
CONFIG_ZMK_POINTING=y               # Enable pointing device functionality
CONFIG_MOUSE=y                      # Enable mouse functionality (works with pointing device)
CONFIG_NFCT_PINS_AS_GPIOS=y         # Use NFC pins as GPIO
CONFIG_GPIO=y                       # Enable GPIO functionality
CONFIG_SPI=y                        # Enable SPI communication
CONFIG_INPUT=y                      # Enable input device functionality
CONFIG_ZMK_EXT_POWER=y              # Enable external power control

########################################
# Bluetooth Settings
########################################
CONFIG_ZMK_BLE=y                    # Enable Bluetooth Low Energy (BLE) functionality
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y      # Set BLE transmit power to +8dBm (improve range)

# Security / Pairing Settings
CONFIG_BT_SMP=y                     # Enable secure pairing
CONFIG_BT_BONDABLE=y                # Retain pairing information

# Connection Parameters (unit: 1.25ms)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6  # Minimum connection interval (7.5ms)
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12 # Maximum connection interval (15ms)
# CONFIG_BT_PERIPHERAL_PREF_LATENCY=0 # Connection latency (not used)
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400 # Connection timeout (5s units)

# ACL Communication Buffer Settings
CONFIG_BT_BUF_ACL_RX_SIZE=251       # ACL receive buffer size
CONFIG_BT_BUF_ACL_TX_SIZE=251       # ACL transmit buffer size
CONFIG_BT_BUF_ACL_RX_COUNT=10       # Number of ACL receive buffers
CONFIG_BT_BUF_ACL_TX_COUNT=10       # Number of ACL transmit buffers

########################################
# Battery Management
########################################
CONFIG_ZMK_BATTERY_REPORTING=y       # Report battery level
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y # Central fetches battery level from peripherals
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y    # Proxy battery info from peripherals

########################################
# Rotary Encoder Settings
########################################
CONFIG_EC11=y                       # Enable EC11 rotary encoder
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y # Process EC11 events in a global thread

########################################
# Pointing Device (PMW3610 Sensor)
########################################
CONFIG_PMW3610=y                     # Enable PMW3610 optical sensor
CONFIG_PMW3610_INVERT_X=n            # Do not invert X-axis
CONFIG_PMW3610_INVERT_Y=y            # Invert Y-axis
CONFIG_PMW3610_REPORT_INTERVAL_MIN=16 # Minimum report interval (ms)
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y # Experimental BLE connection (disabled)

########################################
# RGB LED Battery Notification
########################################
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30     # High battery level threshold (%)
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10 # Critical battery level threshold (%)

########################################
# ZMK Studio Settings
########################################
CONFIG_ZMK_STUDIO=y                # Enable ZMK Studio integration
CONFIG_ZMK_STUDIO_LOCKING=n        # Disable Studio locking feature

########################################
# Keyboard Specific Settings
########################################
CONFIG_ZMK_KEYBOARD_NAME="zmk"     # Set keyboard name

# Debug Logging Settings
CONFIG_ZMK_USB_LOGGING=y
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=8000
