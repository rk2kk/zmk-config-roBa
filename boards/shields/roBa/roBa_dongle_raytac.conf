########################################
# Basic Features
########################################
CONFIG_INPUT=y                      # Enable input device functionality

########################################
# Bluetooth / Pointing / USB
########################################
CONFIG_ZMK_BLE=y                    # Enable Bluetooth Low Energy functionality
CONFIG_ZMK_POINTING=y               # Enable pointing device functionality
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2  # Allow up to 2 peripherals in split configuration
CONFIG_ZMK_USB=y                    # Enable USB connection (wired support)

########################################
# ZMK Studio Settings
########################################
CONFIG_ZMK_STUDIO=y                 # Enable ZMK Studio integration
CONFIG_ZMK_STUDIO_LOCKING=n         # Disable locking features on the Studio side

########################################
# Battery Management
########################################
CONFIG_ZMK_BATTERY_REPORTING=y      # Report battery level to the host
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y    # Central proxies peripheral battery status
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y # Central fetches battery info from peripherals

########################################
# Keyscan / Debounce Settings
########################################
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5    # Debounce time for key press (ms)
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5  # Debounce time for key release (ms)

########################################
# BLE Communication Optimization
########################################
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y      # Set BLE TX power to +8dBm (improves connection stability)

########################################
# Keyboard Specific Settings
########################################
CONFIG_ZMK_KEYBOARD_NAME="zmk-raytac"  # Set keyboard name to "zmk-raytac"
