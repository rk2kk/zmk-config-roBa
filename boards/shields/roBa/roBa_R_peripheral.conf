########################################
# 基本機能
########################################
CONFIG_ZMK_POINTING=y               # ポインティングデバイス機能を有効化
CONFIG_NFCT_PINS_AS_GPIOS=y         # NFCピンをGPIOとして利用可能にする
CONFIG_GPIO=y                       # GPIO機能を有効化
CONFIG_SPI=y                        # SPI通信を有効化
CONFIG_INPUT=y                      # 入力デバイス機能を有効化
CONFIG_ZMK_EXT_POWER=y              # 外部電源制御機能を有効化

########################################
# バッテリー管理
########################################
CONFIG_ZMK_BATTERY_REPORTING=y      # バッテリーレベルをレポート
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y # セントラル側でバッテリー残量を取得
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y    # ペリフェラル側バッテリー情報をプロキシ転送

########################################
# ポインティングデバイス (PMW3610センサー)
########################################
CONFIG_PMW3610=y                    # PMW3610光学センサーを有効化
CONFIG_PMW3610_INVERT_X=y           # X軸方向を反転
CONFIG_PMW3610_INVERT_Y=n           # Y軸方向は反転しない
CONFIG_PMW3610_REPORT_INTERVAL_MIN=20 # 最小レポート間隔を20msに設定

########################################
# RGB LED バッテリー通知
########################################
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30   # 高バッテリーレベル閾値 (%)
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10 # 低バッテリーレベル閾値 (%)

########################################
# ZMK Studio 設定
########################################
CONFIG_ZMK_STUDIO=y                # ZMK Studio連携を有効化
CONFIG_ZMK_STUDIO_LOCKING=n        # Studio側のロック機能を無効化
