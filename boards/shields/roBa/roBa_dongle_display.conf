########################################
# 基本機能
########################################
CONFIG_INPUT=y                      # 入力デバイス機能を有効化
CONFIG_ZMK_EXT_POWER=y              # 外部電源制御機能を有効化
CONFIG_PINCTRL=y                    # ピン制御機能を有効化

########################################
# Bluetooth / USB / ポインティング
########################################
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2  # スプリット構成で最大2台のペリフェラル接続
CONFIG_ZMK_USB=y                    # USB接続を有効化
CONFIG_ZMK_BLE=y                    # Bluetooth Low Energy 機能を有効化
CONFIG_ZMK_POINTING=y               # ポインティングデバイス機能を有効化
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y      # BLE送信出力を+8dBmに設定（通信安定性を向上）

########################################
# ディスプレイ関連設定
########################################
CONFIG_ZMK_DISPLAY=y                # ディスプレイ機能を有効化
CONFIG_ZMK_IDLE_TIMEOUT=15000       # 15秒の無操作で画面をスリープ
CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=y  # ドングルバッテリー残量を表示
CONFIG_BT_BAS=n                     # Bluetooth Battery Serviceを無効化（独自処理を利用）

########################################
# スリープ関連
########################################
CONFIG_ZMK_SLEEP=y                  # スリープ機能を有効化
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000 # 3600000ms = 60分でディープスリープへ移行
                                      # （※以前は深いスリープ復帰に問題があったが修正済み）

########################################
# バッテリー関連
########################################
CONFIG_ZMK_BATTERY_REPORTING=y       # バッテリー残量をホストにレポート
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y # セントラルがペリフェラルのバッテリー情報を取得
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60 # バッテリーレポートの送信間隔（秒）

########################################
# ZMK Studio
########################################
CONFIG_ZMK_STUDIO=y                 # ZMK Studioとの連携を有効化
CONFIG_ZMK_STUDIO_LOCKING=n         # Studio側のロック機能を無効化

########################################
# デバッグ / ロギング
########################################
# CONFIG_ZMK_USB_LOGGING=y           # USBログ出力（必要時のみ有効化）
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=8000  # ログスレッド起動遅延（ms）

########################################
# キースキャン・デバウンス
########################################
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5    # キー押下時のデバウンス時間（ms）
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5  # キー解放時のデバウンス時間（ms）

########################################
# キーボード固有設定
########################################
CONFIG_ZMK_KEYBOARD_NAME="zmk-display"  # キーボードのデフォルト名を "zmk-display" に設定
