########################################
# Basic Features
########################################
CONFIG_INPUT=y                      # Enable input device functionality
CONFIG_ZMK_EXT_POWER=y              # Enable external power control
CONFIG_PINCTRL=y                    # Enable pin control functionality

########################################
# Bluetooth / USB / Pointing
########################################
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2  # Connect up to 2 peripherals in a split setup
CONFIG_ZMK_USB=y                    # Enable USB connection
CONFIG_ZMK_BLE=y                    # Enable Bluetooth Low Energy
CONFIG_ZMK_POINTING=y               # Enable pointing device functionality
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y      # Set BLE TX power to +8dBm (improves connection stability)

########################################
# Display Settings
########################################
CONFIG_ZMK_DISPLAY=y                # Enable display functionality
CONFIG_ZMK_IDLE_TIMEOUT=15000       # Sleep display after 15 seconds of inactivity
CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=y  # Show dongle battery level
CONFIG_BT_BAS=n                     # Disable Bluetooth Battery Service (using custom handling)

########################################
# Sleep Settings
########################################
CONFIG_ZMK_SLEEP=y                  # Enable sleep functionality
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000 # Enter deep sleep after 60 minutes of inactivity

########################################
# Battery Settings
########################################
CONFIG_ZMK_BATTERY_REPORTING=y       # Report battery level to host
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y # Central fetches battery info from peripherals
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60 # Battery report interval (seconds)

########################################
# ZMK Studio
########################################
CONFIG_ZMK_STUDIO=y                 # Enable integration with ZMK Studio
CONFIG_ZMK_STUDIO_LOCKING=n         # Disable lock feature in Studio

########################################
# Debug / Logging
########################################
# CONFIG_ZMK_USB_LOGGING=y           # USB logging (enable if needed)
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=8000  # Log thread startup delay (ms)

########################################
# Keyscan / Debounce
########################################
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5    # Debounce time for key press (ms)
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5  # Debounce time for key release (ms)

########################################
# Keyboard Specific Settings
########################################
CONFIG_ZMK_KEYBOARD_NAME="zmk-display"  # Set default keyboard name to "zmk-display"
