########################################
# 基本機能
########################################
CONFIG_ZMK_BLE=y                    # Bluetooth Low Energy 機能を有効化
CONFIG_ZMK_POINTING=y               # ポインティングデバイス機能を有効化
CONFIG_NFCT_PINS_AS_GPIOS=y         # NFCピンをGPIOとして使用可能にする
CONFIG_SPI=y                        # SPI通信を有効化
CONFIG_INPUT=y                      # 入力デバイス機能を有効化
CONFIG_ZMK_EXT_POWER=y              # 外部電源制御を有効化

########################################
# ロータリーエンコーダ
########################################
CONFIG_EC11=y                       # EC11ロータリーエンコーダを有効化
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y # EC11の入力をグローバルスレッドで処理

########################################
# バッテリー管理
########################################
CONFIG_ZMK_BATTERY_REPORTING=y      # バッテリーレベルをホストへレポート
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60 # バッテリー残量を60秒ごとに報告
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y    # セントラル側がペリフェラルのバッテリーレベルを代理転送
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y # セントラル側がペリフェラルのバッテリーレベルを取得
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1            # スプリットキーボードで中央/周辺通信を有効化

########################################
# Bluetooth設定
########################################
CONFIG_BT_SMP=y                     # セキュアペアリングを有効化
CONFIG_BT_BONDABLE=y                # ペアリング情報を保持

# BLE接続パラメータ（単位: 1.25ms）
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=20  # 最小接続間隔 (25ms)
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=40  # 最大接続間隔 (50ms)
# CONFIG_BT_PERIPHERAL_PREF_LATENCY=0  # 接続遅延（無効化中）
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400 # 接続タイムアウト (5秒単位)

# ACLパケットバッファ設定
CONFIG_BT_BUF_ACL_RX_SIZE=251       # ACL受信パケットサイズ
CONFIG_BT_BUF_ACL_TX_SIZE=251       # ACL送信パケットサイズ
CONFIG_BT_BUF_ACL_RX_COUNT=10       # ACL受信パケット数
CONFIG_BT_BUF_ACL_TX_COUNT=10       # ACL送信パケット数

# BLE送信出力設定
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y      # 送信出力を+8dBmに設定（通信安定性向上）

########################################
# スリープ・省電力設定
########################################
CONFIG_ZMK_SLEEP=y                  # スリープ機能を有効化
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000  # 30分（1,800,000ms）でディープスリープに移行
CONFIG_ZMK_IDLE_TIMEOUT=15000       # 15秒でアイドル状態に移行

########################################
# キースキャン・デバウンス設定
########################################
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5    # キー押下時のデバウンス時間(ms)
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5  # キー解放時のデバウンス時間(ms)

########################################
# RGB LED バッテリー通知
########################################
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30   # 高バッテリーレベル閾値(%)
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10 # 低バッテリーレベル閾値(%)

########################################
# キーボード固有設定
########################################
CONFIG_ZMK_KEYBOARD_NAME="zmk"       # キーボード名を "zmk" に設定
