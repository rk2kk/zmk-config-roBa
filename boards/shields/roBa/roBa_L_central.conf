########################################
# Basic Features
########################################
CONFIG_ZMK_BLE=y                    # Enable Bluetooth Low Energy functionality
CONFIG_ZMK_POINTING=y               # Enable pointing device functionality
CONFIG_NFCT_PINS_AS_GPIOS=y         # Use NFC pins as GPIO
CONFIG_SPI=y                        # Enable SPI communication
CONFIG_INPUT=y                      # Enable input device functionality
CONFIG_ZMK_EXT_POWER=y              # Enable external power control

########################################
# Rotary Encoder
########################################
CONFIG_EC11=y                       # Enable EC11 rotary encoder
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y # Handle EC11 events in a global thread

########################################
# Battery Management
########################################
CONFIG_ZMK_BATTERY_REPORTING=y       # Report battery level to host
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60 # Report battery every 60 seconds
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y    # Central proxies peripheral battery level
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y # Central fetches battery level from peripherals
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1           # Enable central/peripheral communication for split keyboard

########################################
# Bluetooth Settings
########################################
CONFIG_BT_SMP=y                     # Enable secure pairing
CONFIG_BT_BONDABLE=y                # Retain pairing information

# BLE connection parameters (unit: 1.25ms)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=20  # Minimum connection interval (25ms)
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=40  # Maximum connection interval (50ms)
# CONFIG_BT_PERIPHERAL_PREF_LATENCY=0  # Connection latency (disabled)
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400 # Connection timeout (5-second units)

# ACL packet buffer settings
CONFIG_BT_BUF_ACL_RX_SIZE=251       # ACL RX packet size
CONFIG_BT_BUF_ACL_TX_SIZE=251       # ACL TX packet size
CONFIG_BT_BUF_ACL_RX_COUNT=10       # Number of ACL RX packets
CONFIG_BT_BUF_ACL_TX_COUNT=10       # Number of ACL TX packets

# BLE TX power setting
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y      # Set TX power to +8dBm (improves connection stability)

########################################
# Sleep / Power-saving Settings
########################################
CONFIG_ZMK_SLEEP=y                  # Enable sleep functionality
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000  # Enter deep sleep after 30 minutes (1,800,000ms)
CONFIG_ZMK_IDLE_TIMEOUT=15000       # Enter idle state after 15 seconds

########################################
# Keyscan / Debounce Settings
########################################
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5    # Debounce time for key press (ms)
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5  # Debounce time for key release (ms)

########################################
# RGB LED Battery Notifications
########################################
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30   # High battery threshold (%)
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10 # Critical battery threshold (%)

########################################
# Keyboard Specific Settings
########################################
CONFIG_ZMK_KEYBOARD_NAME="zmk"       # Set keyboard name to "zmk"
