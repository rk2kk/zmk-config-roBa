########################################
# 基本機能
########################################
CONFIG_INPUT=y                      # 入力デバイス機能を有効化
CONFIG_ZMK_EXT_POWER=y              # 外部電源制御機能を有効化
CONFIG_PINCTRL=y                    # ピン制御機能を有効化

########################################
# Bluetooth・ポインティング機能
########################################
CONFIG_ZMK_BLE=y                    # Bluetooth Low Energy 機能を有効化
CONFIG_ZMK_POINTING=y               # ポインティングデバイス機能を有効化
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2  # スプリット構成で2つのペリフェラルを接続

########################################
# ZMK Studio 設定
########################################
CONFIG_ZMK_STUDIO=y                # ZMK Studio 連携を有効化
CONFIG_ZMK_STUDIO_LOCKING=n        # Studio側ロック機能を無効化

########################################
# バッテリー管理
########################################
CONFIG_ZMK_BATTERY_REPORTING=y      # バッテリーレベルをホストにレポート
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y    # セントラルがペリフェラルのバッテリーレベルを代理転送
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y # セントラルがペリフェラルのバッテリーレベルを取得

########################################
# キースキャン・デバウンス設定
########################################
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5    # キー押下時のデバウンス時間(ms)
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5  # キー解放時のデバウンス時間(ms)

########################################
# BLE 通信最適化
########################################
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y      # BLE送信出力を+8dBmに設定（通信安定性向上）

########################################
# キーボード固有設定
########################################
CONFIG_ZMK_KEYBOARD_NAME="zmk-xiao" # キーボード名を "zmk-xiao" に設定
